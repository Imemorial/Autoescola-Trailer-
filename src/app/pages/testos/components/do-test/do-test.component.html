<section class="w-full h-screen flex items-center justify-center do-test">
    <div class="max-w-3xl w-full bg-white shadow-2xl rounded-2xl h-[75vh] overflow-auto">
        
        <div class="bg-primaryColor text-white p-6">
            <h2 class="text-2xl font-bold">Prova de control de coneixements - B</h2>
            <span class="text-sm font-medium">Temps restant: {{ timeLeft | timeFormat }}</span>
        </div>

        <div class="p-6 border-b border-gray-200" *ngIf="exam">
            <h3 class="text-xl font-semibold text-gray-800 leading-relaxed">
                {{ exam.questions[actualQuestion].question }}
            </h3>
        </div>

        <div class="p-6 space-y-3" *ngIf="exam">
            <label 
            class="flex items-center p-4 bg-gray-50 border border-gray-200 rounded-lg hover:bg-gray-100 hover:border-primaryColor cursor-pointer transition-all duration-200" 
            *ngFor="let answer of exam.questions[actualQuestion].answers; index as questionIndex"
            [ngClass]="{
                'correct-input' : sended && answer.option === exam.questions[actualQuestion].correct_answer,
                'incorrect-input' : sended && exam.questions[actualQuestion].selectedAnswer === answer.option && answer.option !== exam.questions[actualQuestion].correct_answer,
                'bg-primaryColor bg-opacity-10 border-primaryColor' : !sended && exam.questions[actualQuestion].selectedAnswer === answer.option
              }"
        >
            <input 
                type="radio" 
                name="question{{actualQuestion}}" 
                class="form-radio h-5 w-5 text-primaryColor"
                [value]="answer.option" 
                (change)="selectAnswer(actualQuestion, answer.option)"
                [checked]="exam.questions[actualQuestion].selectedAnswer === answer.option"
                [disabled]="sended">
            
            <span class="ml-3 text-gray-700 font-medium">
                {{ answer.option }}) {{ answer.answer }}
            </span>
        </label>
        
</div>

        <div class="p-6 flex flex-wrap justify-start gap-2" *ngIf="exam">
            <button 
                *ngFor="let page of [].constructor(exam.questions.length); let i = index" 
                (click)="actualQuestion = i"
                [ngClass]="{
                    'bg-primaryColor text-white': actualQuestion === i && !sended,
                    'bg-white text-gray-700': actualQuestion !== i && !sended,
                    'incorrect': sended && exam.questions[i].selectedAnswer !== exam.questions[i].correct_answer,
                    'correct': sended && exam.questions[i].selectedAnswer == exam.questions[i].correct_answer
                }"
                class="w-10 h-10 rounded-md flex items-center justify-center border border-gray-300 hover:bg-primaryColor hover:text-white transition-all font-medium">
                <span>{{ i + 1 }}</span>
            </button>
        </div>

        <div class="p-6 flex justify-center">
            <button 
                class="px-6 py-3 bg-primaryColor text-white font-bold rounded-md hover:opacity-90 transition-all" 
                (click)="sended ? close() : sendTest()"  
                [innerHTML]="sended ? 'Tancar' : 'Finalitzar test'">
                Finalitzar Test
            </button>
        </div>
    </div>
</section>
