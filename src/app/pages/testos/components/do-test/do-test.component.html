<section class="w-full h-screen flex items-center justify-center do-test">

            <label class="flex items-center p-4 bg-gray-50 border border-gray-200 rounded-lg hover:bg-gray-100 cursor-pointer transition-all duration-200">

            </label>

            <label class="flex items-center p-4 bg-gray-50 border border-gray-200 rounded-lg hover:bg-gray-100 cursor-pointer transition-all duration-200">
                <input type="radio" name="question" class="form-radio h-5 w-5 text-primaryColor">
