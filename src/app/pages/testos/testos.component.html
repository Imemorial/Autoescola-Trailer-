<div class="overflow-hidden">
    <!-- Top component loads immediately - critical for LCP -->
    <app-top [title]="'Testos alumne'" [photo]="'/assets/images/tests/img.jpeg'"></app-top>
    
    <!-- Test component with defer loading -->
    @defer (on viewport) {
        <app-test (stateModal)="setTest($event)"></app-test>
    } @placeholder (minimum 100ms) {
        <div class="relative overflow-hidden">
            <div class="max-w-[85rem] mx-auto padding py-16">
                <div class="max-w-2xl text-center mx-auto">
                    <div class="h-10 w-full max-w-xl bg-gray-200 rounded mx-auto"></div>
                    <div class="h-6 w-64 bg-gray-200 rounded mx-auto mt-4"></div>
                </div>
                <div class="mt-10 relative max-w-5xl mx-auto">
                    <div class="w-full h-96 sm:h-[480px] bg-gray-200 rounded-xl"></div>
                    <div class="absolute inset-0 flex flex-col justify-center items-center">
                        <div class="h-12 w-48 bg-gray-300 rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>
    }
    
    <!-- Do test component - conditional loading with defer -->
    @defer (on viewport) {
        <app-do-test *ngIf="doTest" (boolEvent)="setTest($event)"></app-do-test>
    } @placeholder (minimum 100ms) {
        <div class="w-full h-screen flex items-center justify-center do-test">
            <div class="max-w-3xl w-full bg-white shadow-2xl rounded-2xl h-[75vh] overflow-auto">
                <div class="bg-gray-200 p-6">
                    <div class="h-8 w-64 bg-gray-300 rounded mb-2"></div>
                    <div class="h-5 w-32 bg-gray-300 rounded"></div>
                </div>
                <div class="p-6 border-b border-gray-200">
                    <div class="w-full h-[25vh] bg-gray-200 rounded-lg"></div>
                </div>
                <div class="p-6 border-b border-gray-200">
                    <div class="h-7 w-full bg-gray-200 rounded mb-2"></div>
                    <div class="h-7 w-3/4 bg-gray-200 rounded"></div>
                </div>
                <div class="p-6 space-y-4">
                    <div class="h-16 bg-gray-200 rounded-lg"></div>
                    <div class="h-16 bg-gray-200 rounded-lg"></div>
                    <div class="h-16 bg-gray-200 rounded-lg"></div>
                </div>
            </div>
        </div>
    }
</div>
