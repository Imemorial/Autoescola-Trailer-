<div class="w-full mx-auto flex px-10 mt-[100px]">
    <aside class="w-1/4 bg-white p-4 rounded-lg shadow mr-6">
        <h2 class="text-lg font-semibold mb-4">Filtros</h2>
        <ul class="space-y-2">
            <li><button class="w-full text-left text-gray-700 hover:text-blue-500">Carnets</button></li>
            <li><button class="w-full text-left text-gray-700 hover:text-blue-500">Llicències i permisos</button></li>
        </ul>
    </aside>
    
    <div class="flex-1">
        <div class="grid grid-cols-3 gap-6">
            <div *ngFor="let service of services" class="bg-white p-4 rounded-lg shadow">
                <img [src]="service.image" alt="{{ service.title }}" class="mb-2 w-full rounded h-[25vh] object-cover">
                <h3 class="text-sm font-semibold">{{ service.title }}</h3>
                <p class="text-gray-500 text-xs">{{ service.description }}</p>
            </div>
        </div>
    </div>
</div>
