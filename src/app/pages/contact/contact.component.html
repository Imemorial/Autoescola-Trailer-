<div class="overflow-hidden">
    <!-- Top component loads immediately - critical for LCP -->
    <app-top [title]="'Conecta amb nosaltres'" [photo]="'/assets/images/contact/img-1.jpeg'"></app-top>
    
    <div class="padding">
        <!-- Contact component with defer loading -->
        @defer (on viewport) {
            <app-contact></app-contact>
        } @placeholder (minimum 100ms) {
            <section class="max-w-7xl mx-auto">
                <div class="mb-6 max-w-3xl text-center mx-auto mb-12">
                    <div class="h-8 w-32 bg-gray-200 rounded mx-auto mb-4"></div>
                    <div class="h-12 w-full max-w-xl bg-gray-200 rounded mx-auto"></div>
                </div>
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <div class="h-6 w-full bg-gray-200 rounded"></div>
                        <div class="h-12 bg-gray-200 rounded"></div>
                        <div class="h-12 bg-gray-200 rounded"></div>
                        <div class="h-12 bg-gray-200 rounded"></div>
                        <div class="h-32 bg-gray-200 rounded"></div>
                        <div class="h-12 bg-gray-200 rounded w-32"></div>
                    </div>
                    <div class="h-96 bg-gray-200 rounded-lg"></div>
                </div>
            </section>
        }
        
        <!-- Google Maps iframe with defer loading -->
        @defer (on viewport) {
            <div style="width: 100%">
                <iframe 
                    width="100%" 
                    height="600" 
                    frameborder="0" 
                    scrolling="no" 
                    marginheight="0" 
                    marginwidth="0" 
                    loading="lazy"
                    src="https://maps.google.com/maps?width=100%25&amp;height=600&amp;hl=en&amp;q=Carrer%20de%20Ferrer%20i%20Busquets,%2026,%2025230%20Mollerussa,%20Lleida+(Autoescola%20Trailer)&amp;t=&amp;z=14&amp;ie=UTF8&amp;iwloc=B&amp;output=embed">
                    <a href="https://www.gps.ie/">dog tracker</a>
                </iframe>
            </div>
        } @placeholder (minimum 100ms) {
            <div class="w-full h-[600px] bg-gray-200 rounded-lg flex items-center justify-center">
                <div class="text-center">
                    <div class="h-8 w-64 bg-gray-300 rounded mx-auto mb-2"></div>
                    <div class="h-4 w-48 bg-gray-300 rounded mx-auto"></div>
                </div>
            </div>
        }
    </div>
</div>
