<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white border border-gray-200 rounded-2xl shadow-sm p-8">
    <div class="text-center mb-8">
      <p class="text-sm text-primaryColor font-medium">Accés restringit</p>
      <h1 class="text-2xl font-semibold text-gray-900 mt-1">Panell d'administració</h1>
      <p class="text-sm text-gray-600 mt-2">Introdueix les credencials per gestionar la galeria i les notícies.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Correu electrònic</label>
        <input id="email" type="email" formControlName="email"
               class="w-full rounded-xl border border-gray-300 px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-primaryColor/30 focus:border-primaryColor">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contrasenya</label>
        <input id="password" type="password" formControlName="password"
               class="w-full rounded-xl border border-gray-300 px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-primaryColor/30 focus:border-primaryColor">
      </div>

      <p *ngIf="errorMessage" class="text-sm text-red-600">{{ errorMessage }}</p>

      <button type="submit" [disabled]="isSubmitting"
              class="w-full rounded-xl bg-primaryColor text-white py-3 font-medium hover:bg-primaryColorDark transition-colors disabled:opacity-60">
        {{ isSubmitting ? 'Entrant...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
