<div class="overflow-hidden">
    <!-- Top component loads immediately - critical for LCP -->
    <app-top [title]="'Sobre nosaltres'" [photo]="'/assets/images/about-us/top.jpeg'"></app-top>
    
    <!-- About us info section with defer loading -->
    @defer (on viewport) {
        <app-about-us-info></app-about-us-info>
    } @placeholder (minimum 100ms) {
        <section class="overflow-hidden padding bg-white py-16">
            <div class="container mx-auto">
                <div class="flex flex-wrap items-center justify-between -mx-4">
                    <div class="w-full px-4 lg:w-6/12">
                        <div class="flex items-center -mx-3 sm:-mx-4">
                            <div class="w-full px-3 sm:px-4 xl:w-1/2 space-y-4">
                                <div class="h-48 bg-gray-200 rounded-2xl"></div>
                                <div class="h-48 bg-gray-200 rounded-2xl"></div>
                            </div>
                            <div class="w-full px-3 sm:px-4 xl:w-1/2">
                                <div class="h-64 bg-gray-200 rounded-2xl"></div>
                            </div>
                        </div>
                    </div>
                    <div class="w-full px-4 lg:w-1/2 xl:w-5/12 mt-10 lg:mt-0">
                        <div class="h-6 w-32 bg-gray-200 rounded mb-2"></div>
                        <div class="h-10 w-64 bg-gray-200 rounded mb-4"></div>
                        <div class="h-6 w-full bg-gray-200 rounded mb-2"></div>
                        <div class="h-6 w-3/4 bg-gray-200 rounded mb-6"></div>
                        <div class="h-12 w-40 bg-gray-200 rounded"></div>
                    </div>
                </div>
            </div>
        </section>
    }
    
    <!-- Contact section with defer loading -->
    <div class="bg-gray-100 py-24 px-5">
        @defer (on viewport) {
            <app-contact></app-contact>
        } @placeholder (minimum 100ms) {
            <section class="max-w-7xl mx-auto">
                <div class="mb-6 max-w-3xl text-center mx-auto mb-12">
                    <div class="h-8 w-32 bg-gray-200 rounded mx-auto mb-4"></div>
                    <div class="h-12 w-full max-w-xl bg-gray-200 rounded mx-auto"></div>
                </div>
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <div class="h-12 bg-gray-200 rounded"></div>
                        <div class="h-12 bg-gray-200 rounded"></div>
                        <div class="h-12 bg-gray-200 rounded"></div>
                        <div class="h-32 bg-gray-200 rounded"></div>
                        <div class="h-12 bg-gray-200 rounded w-32"></div>
                    </div>
                    <div class="h-96 bg-gray-200 rounded-lg"></div>
                </div>
            </section>
        }
    </div>
</div>
