<section class="py-10 mt-10 padding">
  <div class="max-w-6xl mx-auto px-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-8">
      <div *ngFor="let image of visibleImages; index as i" 
           class="group cursor-pointer overflow-hidden rounded-2xl bg-white ring-1 ring-gray-100 shadow-sm transition-transform duration-300 ease-out hover:shadow-md"
           [attr.data-aos]="'fade-up'"
           (click)="openModal(i)">
        <div class="relative aspect-w-4 aspect-h-3 bg-gray-50">
          <img [src]="image.image_url || '/assets/images/gallery/img-1.jpeg'"
               [alt]="image.title || 'Imatge de galeria'"
               loading="lazy"
               class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-[1.03]" />
          <div class="pointer-events-none absolute inset-0 bg-gradient-to-t from-black/10 via-black/0 to-transparent opacity-0 transition-opacity duration-300 group-hover:opacity-100"></div>
        </div>
      </div>
    </div>
    <div class="text-center mt-8" *ngIf="visibleImages.length < images.length">
      <button (click)="loadMore()" aria-label="Carregar més" class="inline-flex items-center gap-2 rounded-full bg-primaryColor text-white px-6 py-3 font-medium shadow-sm transition-colors duration-200 hover:bg-primaryColor/90 focus:outline-none focus:ring-2 focus:ring-primaryColor/30">
        Carregar més
      </button>
    </div>
  </div>
</section>

<div *ngIf="isModalOpen" class="fixed inset-0 bg-black/60 flex justify-center items-center z-50 p-4" (click)="closeModal()">
  <div class="relative bg-white p-2 md:p-3 rounded-2xl shadow-2xl max-w-screen-lg w-full" (click)="$event.stopPropagation()">
    <button (click)="closeModal()" class="absolute -top-3 -right-3 md:-top-4 md:-right-4 inline-flex items-center justify-center w-9 h-9 rounded-full bg-primaryColor text-white shadow-lg ring-1 ring-white/60">
      <svg width="15" height="15" viewBox="-0.5 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#fff">
        <path d="M3 21.32L21 3.32001" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M3 3.32001L21 21.32" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </button>
    <img [src]="selectedImage?.image_url || '/assets/images/gallery/img-1.jpeg'" 
         [alt]="selectedImage?.title || 'Imatge de galeria'" 
         loading="lazy" 
         class="w-full max-h-[80vh] object-contain rounded-xl">
  </div>
</div>
