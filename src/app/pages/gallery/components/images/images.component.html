<section class="padding">
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
      <img class="w-full h-[35vh] size-40 object-cover"
           *ngFor="let image of images; index as i"
           [src]="image.image_url"

           [attr.data-aos]="'fade-up'">
  </div>
</section>
