<div
  class="w-full mx-auto padding text-center special-section bg-gray-100 py-12 rounded-lg"
>
  <h3 class="text-primaryColor font-extrabold text-lg uppercase tracking-wider">
    Carnets de Conduir Disponibles
  </h3>
  <h1 class="text-4xl font-bold mt-3 text-gray-900">
    Oferim els Millors Cursos de Conduir
  </h1>

  <div class="mt-3 max-w-7xl mx-auto relative splide">
    <button
      id="slider-button-left"
      class="absolute top-1/2 left-2 transform -translate-y-1/2 bg-primaryColor text-white p-3 rounded-full shadow-xl hover:bg-opacity-90 transition duration-300 focus:outline-none z-10"
    >
      <svg
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 19l-7-7 7-7"
        ></path>
      </svg>
    </button>

    <div class="splide__track">
      <ul class="splide__list">
        <li
          class="splide__slide bg-white rounded-lg overflow-hidden shadow-lg transform hover:scale-105 transition duration-300"
          *ngFor="let service of services; index as i"
        >
          <img
            [src]="service.image"
            alt="Pre-Licensing Course"
            class="w-full h-[25vh] object-cover rounded-t-lg"
          />
          <div class="p-6">
            <h2 class="text-xl font-bold mt-2 text-gray-800">
              {{ service.title }}
            </h2>
            <p class="text-gray-600 mt-2 leading-relaxed">
              {{ service.description }}
            </p>
          </div>
        </li>
      </ul>
    </div>

    <button
      id="slider-button-right"
      class="absolute top-1/2 right-2 transform -translate-y-1/2 bg-primaryColor text-white p-3 rounded-full shadow-xl hover:bg-opacity-90 transition duration-300 focus:outline-none z-10"
    >
      <svg
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9 5l7 7-7 7"
        ></path>
      </svg>
    </button>
  </div>

  <div class="mt-8">
    <a
      href="#all-services"
      class="inline-block text-lg font-semibold text-primaryColor hover:text-primaryColor-dark transition duration-300 px-12 py-4 border-2 border-primaryColor rounded-lg hover:bg-primaryColor hover:text-white"
    >
      Veure tot
    </a>
  </div>
</div>
