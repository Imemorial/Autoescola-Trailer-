<section class="py-24">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="flex justify-center flex-wrap md:flex-wrap lg:flex-nowrap lg:flex-row lg:justify-between gap-8">
        <div class="w-full flex justify-between flex-col lg:w-2/5">
          <div class="block lg:text-left text-center">
            <h2 class="text-4xl font-bold text-gray-900 leading-[3.25rem] mb-5">
              Nuestros <span class="text-primaryColor">servicios</span>
            </h2>
            <p class="text-gray-500 mb-10 max-lg:max-w-xl max-lg:mx-auto">
              Descubre nuestros cursos para la obtención de carnets de conducir. Formación profesional, flexible y adaptada a tus necesidades.
            </p>
            <a href="javascript:;" class="cursor-pointer border border-gray-300 shadow-sm rounded-full py-3.5 px-7 w-52 lg:mx-0 mx-auto flex justify-center text-gray-900 font-semibold transition-all duration-300 hover:bg-gray-100">
              Ver todos
            </a>
          </div>
        </div>
        <div class="w-full lg:w-3/6">
          <div class="splide">
            <div class="splide__track">
              <ul class="splide__list">
                <li class="splide__slide" *ngFor="let servicio of servicios">
                    <div class="swiper-slide w-full max-lg:max-w-xl group">
                        <div class="flex items-center mb-9">
                            <img src="https://pagedone.io/asset/uploads/1696244059.png" alt="blogs tailwind section" class="rounded-2xl w-full object-cover">
                        </div>
                        <h3 class="text-xl text-gray-900 font-medium leading-8 mb-4 group-hover:text-indigo-600">{{servicio.titulo}}</h3>
                        <p class="text-gray-500 leading-6 transition-all duration-500 mb-8">
                            {{servicio.descripcion}}
                        </p>
                    </div>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
