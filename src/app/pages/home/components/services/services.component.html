<div class="text-center special-section padding">
  <h6 class="text-lg text-primaryColor font-medium text-center">Preguntes Freqüents</h6>
  <h2 class="text-4xl font-manrope text-center font-bold text-gray-900 leading-[3.25rem]">
    Carnets i Llicències de l'Autoescola.
  </h2>
  <div class="splide w-7/12 mx-auto" id="permisos-slider">
      <div class="splide__track">
          <ul class="splide__list">
              <li class="splide__slide" *ngFor="let service of services; index as i">
                  <div class="bg-white p-6 rounded-lg shadow-lg flex flex-col items-center">
                      <img [src]="service.image" [alt]="service.title + 'img'">
                      <p class="mt-2 text-xl font-semibold">{{service.title}}</p>
                  </div>
              </li>
          </ul>
      </div>
  </div>
</div>
