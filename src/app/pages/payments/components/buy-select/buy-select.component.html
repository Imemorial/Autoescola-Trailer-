<app-payments-top></app-payments-top>

<section class="max-w-6xl mx-auto text-center py-8 px-2">
  <h2 class="text-4xl font-extrabold text-gray-800 mb-3">Selecciona el permís de {{type}}</h2>
  <p class="text-lg text-gray-600 mb-8">Selecciona el permís que vols obtenir i completa la teva matrícula.</p>

  <div class="grid gap-8 grid-cols-1 md:grid-cols-2 lg:grid-cols-3 mt-4">
    <div *ngFor="let filteredService of filteredServices; index as i" class="bg-white cursor-pointer p-10 rounded-xl shadow hover:shadow-lg flex flex-col items-center transition-all duration-200 border border-gray-100 w-full" (click)="setOpened(true)">
      <img [src]="filteredService.image" alt="{{filteredService.title}}" class="w-24 h-24 mb-4">
      <h3 class="text-xl font-semibold text-gray-800 mb-1">{{filteredService.title}}</h3>
    </div>
  </div>
</section>

<app-payments-form *ngIf="menuOpened" (closed)="setOpened(false)"></app-payments-form>
