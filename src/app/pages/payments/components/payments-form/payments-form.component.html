<div
  class="fixed top-0 left-0 w-full h-screen flex items-center justify-center px-4 z-50"
  style="background: linear-gradient(120deg, #ff181e99 0%, #fff 100%); backdrop-filter: blur(2px);"
>
  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="bg-white w-full max-w-lg shadow-2xl p-10 rounded-3xl border border-gray-200 relative animate-fade-in"
    novalidate
  >
    <button type="button" (click)="close()" aria-label="Tancar" class="absolute top-4 right-4 text-gray-400 hover:text-primaryColor text-2xl font-bold focus:outline-none">&times;</button>
    <img src="/assets/images/logo2.png" alt="Logo" class="w-16 h-16 mx-auto mb-4 rounded-full shadow-md border border-gray-200 bg-white" />
    <h2 class="text-3xl font-bold text-center text-gray-900 mb-2">Realitza el teu pagament</h2>
    <p class="text-center text-gray-500 mb-8">Omple el formulari per completar la teva matrícula o servei.</p>

    <div class="space-y-6">
      <div>
        <label class="block text-gray-700 text-sm font-medium mb-2" for="studentName">
          Nom complet de l'alumne <span class="text-primaryColor">*</span>
        </label>
        <input
          id="studentName"
          type="text"
          formControlName="studentName"
          class="bg-gray-100 border border-gray-300 rounded-lg w-full py-3 px-4 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primaryColor transition"
          placeholder="Joan Pérez"
        />
        <p *ngIf="form.get('studentName')?.invalid && form.get('studentName')?.touched" class="text-red-500 text-xs italic mt-1">
          El nom és obligatori.
        </p>
      </div>

      <div>
        <label class="block text-gray-700 text-sm font-medium mb-2" for="description">
          Concepte del pagament (curs, matrícula, pràctiques...) <span class="text-primaryColor">*</span>
        </label>
        <input
          id="description"
          type="text"
          formControlName="description"
          class="bg-gray-100 border border-gray-300 rounded-lg w-full py-3 px-4 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primaryColor transition"
          placeholder="Classes pràctiques, matrícula, etc."
        />
        <p *ngIf="form.get('description')?.invalid && form.get('description')?.touched" class="text-red-500 text-xs italic mt-1">
          El concepte és obligatori.
        </p>
      </div>

      <div>
        <label class="block text-gray-700 text-sm font-medium mb-2" for="amount">
          Import a pagar (€) <span class="text-primaryColor">*</span>
        </label>
        <input
          id="amount"
          type="number"
          formControlName="amount"
          min="0.01"
          step="0.01"
          class="bg-gray-100 border border-gray-300 rounded-lg w-full py-3 px-4 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primaryColor transition"
          placeholder="150"
        />
        <p *ngIf="form.get('amount')?.invalid && form.get('amount')?.touched" class="text-red-500 text-xs italic mt-1">
          Introdueixi una quantitat vàlida en euros.
        </p>
      </div>
    </div>

    <div class="flex justify-center mt-10">
      <button
        type="submit"
        [disabled]="!form.valid"
        [ngClass]="{
          'bg-primaryColor hover:bg-red-700 cursor-pointer text-white shadow-lg': form.valid,
          'bg-red-200 cursor-not-allowed text-white': !form.valid
        }"
        class="font-semibold text-lg py-3 px-10 rounded-full transition duration-200 border-2 border-primaryColor"
      >
        Pagar ara
      </button>
    </div>
  </form>
</div>
