<section class="flex justify-center items-center padding">
  <div class="flex flex-col md:flex-row bg-white rounded-lg w-full md:w-4/5">
    
    <div class="w-full md:hidden p-4 md:p-6 rounded-t-lg text-white">
      <div class="relative">
        <select
          class="w-full py-3 pl-5 pr-12 text-white border-none rounded-lg bg-primaryColor shadow-md focus:ring-white appearance-none"
          (change)="onLicenseChange($event)"
          >
        <option
        *ngFor="let license of licences; index as i"
        [value]="i"
        [selected]="i === actual"
        [ngClass]="{'bg-red-500': i === actual, 'bg-white': i !== actual}"
        class="text-black"
      >
        {{ license.license }}
      </option>
        </select>
    
        <div class="absolute right-4 top-1/2 transform -translate-y-1/2 pointer-events-none">
          <svg width="25" height="25" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#fff"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M7 10L12 15L17 10" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>
        </div>
      </div>
    </div>
  
    <div class="w-full md:w-1/4 p-4 md:p-6 rounded-t-lg md:rounded-l-lg text-white md:block hidden">
      <ul class="flex md:flex-col overflow-x-auto md:overflow-visible">
        <li
          (click)="select(i)"
          class="flex-1 text-center py-3 bg-primaryColor cursor-pointer transition duration-300 whitespace-nowrap md:w-full"
          [ngClass]="{
            'bg-primaryColor text-white': i === actual,
            'bg-white text-black border': i !== actual
          }"
          *ngFor="let license of licences; index as i"
        >
          {{ license.license }}
        </li>
      </ul>
    </div>
  
    <div class="w-full md:w-3/4 p-4 md:p-8">
      <div class="bg-white rounded-lg p-4 md:p-6">
        <h2 class="text-2xl md:text-3xl font-semibold mb-4 text-gray-800">
          Permiso para:
          <span id="category-name" class="font-medium text-primaryColor">
            Selecciona una opción
          </span>
        </h2>
        <p class="principal-paragraph">
          Realiza el pago de una práctica o de la matrícula de forma fácil y desde casa.
        </p>

        <div class="mt-6">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div
              *ngFor="let type of licences[actual].types"
              class="bg-white rounded-lg shadow-sm p-4 md:p-5 border h-auto md:h-[20vh] relative"
            >
              <h4 class="text-lg md:text-xl font-semibold text-gray-800">
                {{ type.type }}
              </h4>
              <p class="text-xs md:text-sm text-gray-600">
                Descripción de la práctica relacionada con la circulación.
              </p>

              <button
                class="w-full mt-3 py-2 bg-primaryColor text-white rounded-lg hover:bg-primaryColorDark transition duration-300"
                (click)="pay(type.price)"
              >
              Realizar pago
              </button>

              <div class="info w-full">
                <div class="info p-3 rounded-md flex itenms.center justify-between">
                  <h6 class="text-xs md:text-sm font-semibold text-primaryColor">
                    <span class="text-gray-400 font-normal mr-1">Durada: </span>{{ type.duration }}
                  </h6>
                  <h6 class="text-xs md:text-sm font-semibold text-primaryColor">
                    <span class="text-gray-400 font-normal mr-1">Precio: </span>{{ type.price | number : "1.2-2" }}€
                  </h6>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
