<header [ngClass]="{'scrolled': scrolled}">

    <img src="/assets/images/logo.png" routerLink="/inici" width="150" height="150" alt="logo">

    <nav [ngClass]="{'opened': opened}">
        <a routerLink="/inici" routerLinkActive="active" class="text-lg">Inici</a>
        <a routerLink="/serveis" routerLinkActive="active" class="text-lg">Serveis</a>
        <a routerLink="/nosaltres" routerLinkActive="active" class="text-lg">Nosaltres</a>
        <a routerLink="/galeria" routerLinkActive="active" class="text-lg">Galeria</a>
        <a routerLink="/testos" routerLinkActive="active" class="text-lg">Testos</a>
        <a routerLink="/pagaments" routerLinkActive="active" class="text-lg">Pagaments</a>
        <a routerLink="/contacte" routerLinkActive="active" class="text-lg">Contacta</a>

        <button class="close" (click)="opened = false">
            <svg width="64px" height="64px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#fff">
                <path d="M6 18L18 6M6 6L18 18" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </button>
    </nav>

    <button (click)="opened = true" class="open">
        <svg width="64px" height="64px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#fff">
            <path d="M4 6H20M4 12H20M4 18H20" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
    </button>

</header>
