<header [ngClass]="{'scrolled': scrolled}">
    <h1 class="text-2xl"><span>A</span>uto<span>t</span>railer</h1>

    <nav [ngClass]="{'opened': opened}">
        <a href="#" class="text-lg">Inici</a>
        <a href="#" class="text-lg">Serveis</a>
        <a href="#" class="text-lg">Sobre nosaltres</a>
        <a href="#" class="text-lg">Contacta</a>

        <button class="close" (click)="opened = false">
            <svg width="64px" height="64px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#fff">
                <path d="M6 18L18 6M6 6L18 18" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </button>
    </nav>

    <button (click)="opened = true" class="open">
        <svg width="64px" height="64px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#fff">
            <path d="M4 6H20M4 12H20M4 18H20" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
    </button>

</header>
