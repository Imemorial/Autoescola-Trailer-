<section>
    <div class="mx-auto w-full max-w-7xl px-5 py-16 md:px-10 md:py-20">
      <div class="flex flex-col items-center text-center">
        <h2 class="text-3xl font-bold md:text-5xl"> Soluciones completas para tu equipo </h2>
        <p class="mb-8 mt-4 max-w-xl text-base text-gray-500 md:mb-12 md:text-lg lg:mb-16"> Ofrecemos servicios especializados para garantizar el mejor rendimiento, mantenimiento y soporte técnico para tus equipos. </p>
      </div>
      <div class="grid gap-5 sm:grid-cols-2 md:grid-cols-3 md:gap-4 lg:gap-6">
        <div class="grid gap-6 rounded-md border border-solid border-gray-300 p-8 md:p-10" *ngFor="let item of gridItems; index as i">
            
            <div [innerHTML]="getSvg(i)"></div>

          <h3 class="text-xl font-semibold">{{item.title}}</h3>
          <p class="text-sm text-gray-500">{{item.description}}</p>
        </div>
      </div>
    </div>
  </section>
